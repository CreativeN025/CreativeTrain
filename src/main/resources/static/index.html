<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Startpage</title>

    <link rel="stylesheet" href="./stylesheet.css" />
</head>

<body>
    <div id="transitionScreen" class="transition-screen"></div>
    <div class="centered">

        <!-- Main Panel -->
        <div class="main">

            <h1>Session Control</h1>

            <button onclick="generatePlayerQr()">
                Generate QR Code
            </button>

            <button onclick="startSession()">
                Host Session
            </button>

            <button onclick="registerAndConnect()">
                Register
            </button>

            <div class="checkboxRow">
                <input type="checkbox" name="isHost" id="isHost">
                <label for="isHost">I am the host</label>
            </div>

            <input
                class="fileUpload"
                type="file"
                id="player-uuid"
                accept="image/*"
            >

            <input
                type="text"
                id="player-name"
                placeholder="Player Name"
            >

            <input
                type="text"
                id="register-session-uuid"
                placeholder="Session UUID"
            >

            <div class="absoluteCenter">
                <img id="qrCode" alt="QR Code">
            </div>

        </div>

        <!-- User Panel -->
        <div id="currentUsers" class="currentUsers">

            <p
                class="sessionDisplay"
                id="sessionUuidDisplay"
            >
                No session active
            </p>
            
            <button onclick="leaveSession()">Leave Game</button>

            <h3>Current Users</h3>

            <ul id="userList">
                <li>No users connected</li>
            </ul>
            
        </div>

    </div>

    <script src="ApiRequester.js"></script>

</body>
</html>
